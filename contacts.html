<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts - CRM</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="navbar">
        <h1>👥 Contacts</h1>
        <nav>
            <a href="/">Email Assistant</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/companies">Companies</a>
            <a href="/contacts">Contacts</a>
            <a href="/conversations">Conversations</a>
        </nav>
    </div>
    
    <div class="container">
        <div class="page-header">
            <div>
                <h2>Manage Contacts</h2>
                <p>View and manage all contacts in your CRM</p>
            </div>
            <button class="btn-primary" onclick="showAddModal()">+ Add Contact</button>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search contacts..." onkeyup="searchContacts()">
            <select id="companyFilter" onchange="filterByCompany()">
                <option value="">All Companies</option>
            </select>
        </div>
        
        <div class="table-container">
            <table id="contactsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Position</th>
                        <th>Phone</th>
                        <th>Company</th>
                        <th>Conversations</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="contactsBody">
                    <tr><td colspan="7" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Add/Edit Modal -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add Contact</h2>
            <form id="contactForm" onsubmit="saveContact(event)">
                <input type="hidden" id="contactId">
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" id="contactName" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="contactEmail" required>
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <input type="text" id="contactPosition" placeholder="Sales Manager">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="contactPhone">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <select id="contactCompany">
                        <option value="">No Company</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/static/contacts.js"></script>
</body>
</html>
